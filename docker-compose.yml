version: '3.8'
services:
  frontend:
    build: .
    command: pnpm preview --host --port 3000
    ports:
      - "80:3000"
    restart: always

  backend:
    build: .
    # THIS IS THE FIX: Running the compiled JS file
    command: node dist-server/index.js
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - STRIPE_SECRET_KEY=sk_test_YOUR_KEY_HERE
    restart: always

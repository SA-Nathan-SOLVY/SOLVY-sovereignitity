# ============================================================================
# SOLVY Ecosystem™ — CI/CD Pipeline
# Gitea Actions / GitHub Actions
# Automatically deploys to Hetzner VPS on push to main
# ============================================================================

name: Deploy to Production

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'prompts/**'
      - '.gitignore'
      - '.DS_Store'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  DEPLOY_DIR: /root/solvy-deployment

jobs:
  # ========================================================================
  # JOB 1: TEST
  # ========================================================================
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'solvy-platform/server/package-lock.json'

      - name: Install backend dependencies
        run: |
          cd solvy-platform/server
          npm ci --prefer-offline

      - name: Syntax check all server files
        run: |
          cd solvy-platform/server
          for f in index.js routes/*.js db/*.js models/*.js config/*.js; do
            if [ -f "$f" ]; then
              echo "Checking: $f"
              node --check "$f"
            fi
          done
          echo "✅ All server files pass syntax check"

      - name: Verify deployment scripts exist
        run: |
          test -f deployment/scripts/setup.sh || (echo "❌ setup.sh missing" && exit 1)
          test -f deployment/scripts/deploy.sh || (echo "❌ deploy.sh missing" && exit 1)
          test -f deployment/scripts/nginx-config.conf || (echo "❌ nginx-config.conf missing" && exit 1)
          test -x deployment/scripts/setup.sh || chmod +x deployment/scripts/setup.sh
          test -x deployment/scripts/deploy.sh || chmod +x deployment/scripts/deploy.sh
          echo "✅ All deployment scripts present and executable"

      - name: Verify frontend files exist
        run: |
          test -f solvy-platform/welcome.html || (echo "❌ welcome.html missing" && exit 1)
          test -f solvy-platform/privacy-sovereignty.html || echo "⚠️ privacy-sovereignty.html missing"
          test -f solvy-platform/js/components/ai-chat-widget.js || (echo "❌ ai-chat-widget.js missing" && exit 1)
          echo "✅ Frontend files verified"

  # ========================================================================
  # JOB 2: PREPARE
  # ========================================================================
  prepare:
    name: Prepare Deployment Package
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment structure
        run: |
          bash deployment/scripts/prepare-local.sh

      - name: Archive deployment package
        run: |
          tar czf solvy-deploy.tar.gz -C deployment .

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: solvy-deployment
          path: solvy-deploy.tar.gz
          retention-days: 7

  # ========================================================================
  # JOB 3: DEPLOY
  # ========================================================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: solvy-deployment

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          log-public-key: false

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Extract and upload to VPS
        run: |
          # Extract locally
          tar xzf solvy-deploy.tar.gz -C /tmp/solvy-deploy

          # Create remote directory if needed
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p ${{ env.DEPLOY_DIR }}"

          # Sync files via rsync
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            /tmp/solvy-deploy/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_DIR }}/

          echo "✅ Files uploaded to VPS"

      - name: Execute deploy script on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTESSH'
            set -e
            cd /root/solvy-deployment

            echo "========================================"
            echo "Starting remote deployment..."
            echo "========================================"

            # Ensure scripts are executable
            chmod +x scripts/setup.sh scripts/deploy.sh 2>/dev/null || true

            # Run the deploy
            ./scripts/deploy.sh

            echo "========================================"
            echo "Remote deployment complete!"
            echo "========================================"
          REMOTESSH

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 5

          # Check backend health via nginx
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ secrets.VPS_HOST }}/health 2>/dev/null || echo "000")

          if [ "$HEALTH_STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP 200)"
          else
            echo "⚠️  Health check returned HTTP $HEALTH_STATUS"
            echo "Checking via HTTP (in case HTTPS is not ready)..."
            HEALTH_STATUS_HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.VPS_HOST }}/health 2>/dev/null || echo "000")
            echo "HTTP health check: $HEALTH_STATUS_HTTP"
          fi

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ DEPLOYMENT FAILED"
          echo "Check VPS logs: ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'pm2 logs solvy-api'"
          echo "Or: ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'tail -f /var/www/solvy/logs/error.log'"

      - name: Notify on success
        if: success()
        run: |
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "Site: https://${{ secrets.VPS_HOST }}"
          echo "Back office: https://${{ secrets.VPS_HOST }}/back-office.html"

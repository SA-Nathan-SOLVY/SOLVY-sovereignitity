<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Customizer | Personalize Your SOLVY Card</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #fff;
            line-height: 1.6;
        }
        .navbar {
            background: rgba(30, 41, 59, 0.95);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(34, 197, 94, 0.3);
        }
        .navbar a { color: #22c55e; text-decoration: none; font-weight: 600; }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        h1 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 3rem;
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .customizer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }
        .card-preview {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            border: 1px solid rgba(147, 51, 234, 0.3);
        }
        .card-preview .emoji {
            font-size: 6rem;
            margin-bottom: 1rem;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .option-group {
            background: rgba(30, 41, 59, 0.8);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(147, 51, 234, 0.2);
        }
        .option-group h3 {
            color: #a78bfa;
            margin-bottom: 1rem;
        }
        .color-options {
            display: flex;
            gap: 1rem;
        }
        .color-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
        }
        .color-option.selected {
            border-color: #fff;
        }
        .btn {
            background: linear-gradient(135deg, #9333ea, #7c3aed);
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 1rem;
        }
        @media (max-width: 768px) {
            .customizer-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="solvy-card.html">← Back to Card</a>
        <span style="color: #fff; font-weight: 600;">Card Customizer</span>
    </nav>
    <div class="container">
        <h1>Personalize Your SOLVY Card</h1>
        <div class="customizer-grid">
            <div class="card-preview">
                <div class="emoji">💳</div>
                <h2>SOLVY Card Preview</h2>
                <p style="color: #94a3b8; margin-top: 1rem;">Your custom design will appear here</p>
            </div>
            <div class="options">
                <div class="option-group">
                    <h3>Card Color</h3>
                    <div class="color-options">
                        <div class="color-option selected" style="background: #9333ea;"></div>
                        <div class="color-option" style="background: #22c55e;"></div>
                        <div class="color-option" style="background: #3b82f6;"></div>
                        <div class="color-option" style="background: #ec4899;"></div>
                    </div>
                </div>
                <div class="option-group">
                    <h3>Card Material</h3>
                    <p style="color: #94a3b8;">Standard Plastic • Metal (+$50) • Wood (+$25)</p>
                </div>
                <button class="btn">Save Design</button>
            </div>
        </div>
    </div>
</body>
</html>

# Nginx reverse proxy for SOLVY Platform
# Matches Replit Production: ebl.beauty, solvy.cards, solvy-sovereignitity--smayone.replit.app

upstream solvy_platform {
    server solvy-platform:80;
}

server {
    listen 80;
    server_name ebl.beauty www.ebl.beauty;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ebl.beauty www.ebl.beauty;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/ebl.beauty/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ebl.beauty/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy to solvy-platform container
    location / {
        proxy_pass http://solvy_platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/ebl.beauty.access.log;
    error_log /var/log/nginx/ebl.beauty.error.log;
}

server {
    listen 80;
    server_name solvy.cards www.solvy.cards;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name solvy.cards www.solvy.cards;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/solvy.cards/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solvy.cards/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Static files (SOLVY Card frontend)
    root /var/www/solvy.cards;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/solvy.cards.access.log;
    error_log /var/log/nginx/solvy.cards.error.log;
}

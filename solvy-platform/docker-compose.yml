version: '3.9'

networks:
  solvy:
    external: false

services:
  solvy-platform:
    build: .
    container_name: solvy-platform
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
      - DOMAIN=ebl.beauty
      - DOMAIN_CARDS=solvy.cards
      - DOMAIN_REPLIT=solvy-sovereignitity--smayone.replit.app
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: solvy-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=solvy
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=solvy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solvy -d solvy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solvy

  # Nginx reverse proxy for production
  nginx-proxy:
    image: nginx:alpine
    container_name: solvy-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - solvy-platform
    networks:
      - solvy

volumes:
  postgres_data:

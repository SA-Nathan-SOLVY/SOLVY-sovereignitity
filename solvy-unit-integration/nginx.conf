server {
    listen 80;
    server_name ebl.beauty www.ebl.beauty;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ebl.beauty www.ebl.beauty;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/ebl.beauty/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ebl.beauty/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Static files (SOLVY frontend)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API requests -> Node.js server
    location /api/ {
        proxy_pass http://solvy-api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Webhook endpoint
    location /webhooks/ {
        proxy_pass http://solvy-api:3000/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    access_log /var/log/nginx/ebl.beauty.access.log;
    error_log /var/log/nginx/ebl.beauty.error.log;
}


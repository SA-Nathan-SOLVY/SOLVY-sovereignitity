server {
    if ($host = solvy.cards) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name solvy.cards www.solvy.cards;
    return 301 https://$server_name$request_uri;


}

server {
    listen 443 ssl http2;
    server_name solvy.cards www.solvy.cards;
    
    root /var/www/solvy.cards;
    index index.html;
    
    # SSL - Lets Encrypt - Cloudflare Full Strict compatible
    ssl_certificate /etc/letsencrypt/live/ebl.beauty/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ebl.beauty/privkey.pem; # managed by Certbot
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # EBL Partner Page
    location /health {
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ebl {
        alias /var/www/solvy.cards/ebl;
        index index.html;
        try_files $uri $uri/ =404;
    }
    
    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp|json|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Service Worker - no cache
        # Cache busting for HTML files
        location ~* .html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

    location = /sw.js {
        add_header Cache-Control "no-cache";
        access_log off;
    }
    
    # SPA fallback for main site
        location /app {
            alias /var/www/solvy.cards/app;
            index index.html;
            try_files $uri $uri/ /app/index.html;
        }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
    
    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Webhooks proxy
    location /webhooks/ {
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    access_log /var/log/nginx/solvy.cards.access.log;
    error_log /var/log/nginx/solvy.cards.error.log;


}

# ============================================================
# SOLVY Ecosystem™ — Nginx Reverse Proxy for Grafana
# ============================================================
# Place this in /etc/nginx/sites-available/grafana.ebl.beauty
# Then: ln -s /etc/nginx/sites-available/grafana.ebl.beauty /etc/nginx/sites-enabled/
#
# Features:
#   - HTTPS only (redirects HTTP → HTTPS)
#   - Basic auth for additional security layer
#   - Proxies to Grafana container on localhost:3001
#   - WebSocket support for Grafana Live
# ============================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name grafana.ebl.beauty;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name grafana.ebl.beauty;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/ebl.beauty/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ebl.beauty/privkey.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Basic authentication (additional layer beyond Grafana login)
    # Generate password file: htpasswd -c /etc/nginx/.grafana_htpasswd admin
    auth_basic "SOLVY Monitoring";
    auth_basic_user_file /etc/nginx/.grafana_htpasswd;

    # Proxy to Grafana (running in Docker on localhost:3001)
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support (Grafana Live)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Grafana API (if needed externally)
    location /api/ {
        proxy_pass http://localhost:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

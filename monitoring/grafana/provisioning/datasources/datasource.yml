# ============================================================
# SOLVY Ecosystem™ — Grafana Data Source Provisioning
# ============================================================
# Automatically configures the Prometheus data source on first start.
# No manual UI configuration needed.
# ============================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: "2.53.0"
      cacheLevel: "High"
      disableRecordingRules: false
      incrementalQuerying: true
    secureJsonData: {}

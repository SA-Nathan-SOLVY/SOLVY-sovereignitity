# ============================================================================
# SOLVY Ecosystem™ — Nginx Configuration
# Primary: solvy.cards | EBL Client: ebl.beauty
# Place at: /etc/nginx/sites-available/solvy
# Enable with: ln -sf /etc/nginx/sites-available/solvy /etc/nginx/sites-enabled/
# ============================================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=support_limit:10m rate=10r/m;

# ─── HTTP: Redirect all to HTTPS ────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name solvy.cards www.solvy.cards ebl.beauty www.ebl.beauty;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS: SOLVY Primary (solvy.cards) ─────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name solvy.cards www.solvy.cards;
    root /var/www/ebl.beauty;
    index welcome.html index.html;

    ssl_certificate /etc/letsencrypt/live/solvy.cards/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solvy.cards/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /health {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # API routes
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Support endpoint — stricter rate limiting
    location /api/support/ {
        limit_req zone=support_limit burst=5 nodelay;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default — serve static files, fallback to welcome.html
    location / {
        try_files $uri $uri/ /welcome.html;
    }

    # Logging
    access_log /var/www/ebl.beauty/logs/nginx-solvy-access.log;
    error_log /var/www/ebl.beauty/logs/nginx-solvy-error.log;
}

# ─── HTTPS: EBL Client (ebl.beauty) ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name ebl.beauty www.ebl.beauty;
    root /var/www/ebl.beauty;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/ebl.beauty/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ebl.beauty/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # API routes (shared backend)
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default — EBL homepage
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Logging
    access_log /var/www/ebl.beauty/logs/nginx-ebl-access.log;
    error_log /var/www/ebl.beauty/logs/nginx-ebl-error.log;
}
